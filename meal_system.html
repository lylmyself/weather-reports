<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>单位订餐系统（用户自备 Token）</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
        body{background:#eef2f7;padding:20px}
        .app-container{max-width:1400px;margin:0 auto;background:#fff;border-radius:28px;padding:24px 28px 32px}
        .auth-panel,.token-panel{max-width:500px;margin:60px auto;background:#fff;border-radius:36px;padding:36px 32px;text-align:center}
        .form-group{margin-bottom:20px;text-align:left}
        .form-group input{width:100%;padding:12px 16px;border:1px solid #cbd5e1;border-radius:28px}
        button{background:#3b82f6;color:#fff;border:none;padding:10px 24px;border-radius:40px;font-weight:600;cursor:pointer;margin:4px 6px}
        .btn-outline{background:#fff;color:#3b82f6;border:1px solid #3b82f6}
        .btn-danger{background:#ef4444}
        .btn-sm{padding:6px 16px}
        .btn-success{background:#10b981}
        .hidden{display:none}
        .error-msg{color:#b91c1c;background:#fee2e2;border-radius:40px;padding:8px 16px;margin-top:12px}
        .info-msg{background:#e6f7e6;border-left:4px solid #10b981;padding:10px;margin-bottom:20px}
        .error-msg-box{background:#fee2e2;border-left:4px solid #dc2626;padding:10px;margin-bottom:20px}
        .table-wrapper{overflow-x:auto;border:1px solid #e2e8f0;border-radius:20px}
        table{width:100%;border-collapse:collapse}
        th,td{padding:10px 8px;text-align:center;border-bottom:1px solid #eef2ff}
        .main-header{display:flex;justify-content:space-between;margin-bottom:24px}
        .stats-card{background:#f8fafc;border-radius:24px;padding:16px 24px;margin-bottom:28px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
        .section{margin-top:32px}
        .section-title{font-size:1.3rem;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;flex-wrap:wrap}
        .modal-mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:1000}
        .modal-container{background:#fff;width:90%;max-width:500px;border-radius:36px}
        .modal-header{padding:18px 24px;border-bottom:1px solid #e2e8f0;font-weight:700;display:flex;justify-content:space-between}
        .modal-body{padding:16px 20px}
        .modal-footer{padding:16px 24px;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end}
        footer{text-align:center;font-size:12px;color:#94a3b8;margin-top:30px}
    </style>
</head>
<body>
<div id="app">
    <!-- Token 设置面板 -->
    <div id="tokenPanel" class="token-panel">
        <h2>🔑 首次使用设置</h2>
        <p>本系统需要访问您的 GitHub 仓库以存储订餐数据。请提供具有该仓库 <strong>contents 读写权限</strong>的 Personal Access Token。</p>
        <div class="form-group">
            <label>GitHub Token</label>
            <input type="password" id="githubTokenInput" placeholder="ghp_xxxx 或 github_pat_xxxx">
        </div>
        <div class="form-group">
            <label>仓库所有者</label>
            <input type="text" id="repoOwnerInput" placeholder="用户名或组织名" value="lylmyself">
        </div>
        <div class="form-group">
            <label>仓库名称</label>
            <input type="text" id="repoNameInput" placeholder="仓库名" value="weather-reports">
        </div>
        <div class="form-group">
            <label>分支</label>
            <input type="text" id="branchInput" placeholder="main" value="main">
        </div>
        <button id="btnSaveToken">保存并连接</button>
        <div id="tokenError" class="error-msg hidden"></div>
        <footer style="margin-top:24px">Token 仅保存在您的浏览器中，不会上传到任何服务器。</footer>
    </div>

    <!-- 登录/注册面板 -->
    <div id="authView" class="auth-panel hidden">
        <h2>🍜 单位订餐系统</h2>
        <div id="diagnosticMsg" class="info-msg">🔍 正在检测 GitHub 连接...</div>
        <button id="btnTestConnection" class="btn-sm">🔄 测试连接</button>
        <button id="btnResetToken" class="btn-outline btn-sm">🔄 更换 Token</button>
        <div id="loginForm">
            <div class="form-group"><label>用户名</label><input type="text" id="loginUsername"></div>
            <div class="form-group"><label>密码</label><input type="password" id="loginPassword"></div>
            <div class="form-group"><input type="checkbox" id="rememberCheckbox"> <label>记住密码</label></div>
            <button id="btnLogin">登录</button>
            <button id="btnShowRegister" class="btn-outline">注册新账号</button>
            <div id="loginError" class="error-msg hidden"></div>
        </div>
        <div id="registerForm" class="hidden">
            <div class="form-group"><label>用户名</label><input type="text" id="regUsername"></div>
            <div class="form-group"><label>密码</label><input type="password" id="regPassword"></div>
            <div class="form-group"><label>确认密码</label><input type="password" id="regConfirmPwd"></div>
            <button id="btnRegister">注册</button>
            <button id="btnBackLogin" class="btn-outline">返回登录</button>
            <div id="regError" class="error-msg hidden"></div>
        </div>
    </div>

    <div id="mainView" class="app-container hidden">
        <div class="main-header"><span id="welcomeUser"></span><button id="logoutBtn" class="btn-danger btn-sm">退出</button></div>
        <div class="stats-card">
            <input type="month" id="monthPicker">
            <button id="refreshMonthBtn">刷新月报</button>
            <span id="monthTotalAmount"></span>
            <button id="editTodayBtn" class="btn-success">✏️ 修改今日订餐</button>
        </div>
        <div class="section">
            <div class="section-title">📋 今日订餐 <span id="todayDateLabel"></span><div><button id="refreshTodayBtn">刷新</button><button id="printTodayBtn">打印</button><button id="exportTodayBtn">导出CSV</button></div></div>
            <div class="table-wrapper"><table><thead>运转<th>姓名</th><th>早餐</th><th>午餐</th><th>晚餐</th><th>合计(元)</th></tr></thead><tbody id="todayTableBody"><tr><td colspan="5">加载中...</td></tr></tbody><tfoot id="todayTableFoot"></tfoot></div>
        </div>
        <div class="section">
            <div class="section-title">📊 月度统计<div><button id="printMonthBtn">打印月报</button><button id="exportMonthBtn">导出CSV</button></div></div>
            <div class="table-wrapper"><table><thead>运转<th>姓名</th><th>早餐总份</th><th>午餐总份</th><th>晚餐总份</th><th>月消费(元)</th></tr></thead><tbody id="monthTableBody"><tr><td colspan="5">请选择月份</td></tr></tbody><tfoot id="monthTableFoot"></tfoot></div>
        </div>
        <footer>⚡ 数据存储于您的 GitHub 仓库，所有用户共享。默认账号：应急值班人员 / 123</footer>
    </div>
</div>
<script>
    // 配置项（占位符会被 Python 替换）
    let CONFIG = {
        repoOwner: "lylmyself",
        repoName: "weather-reports",
        branch: "main",
        dataFile: "meal_data.json"
    };
    let GITHUB_TOKEN = null;
    let currentUser = null;
    let currentMonthCache = null;
    const PRICES = { breakfast: 1.0, lunch: 3.0, dinner: 2.0 };

    function utf8ToBase64(str) {
        const encoder = new TextEncoder();
        const bytes = encoder.encode(str);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
        return btoa(binary);
    }

    async function readDataFile() {
        if (!GITHUB_TOKEN) throw new Error("未设置 GitHub Token");
        const url = `https://api.github.com/repos/${CONFIG.repoOwner}/${CONFIG.repoName}/contents/${CONFIG.dataFile}`;
        const resp = await fetch(url, {
            headers: { "Authorization": `Bearer ${GITHUB_TOKEN}`, "Accept": "application/vnd.github+json", "Cache-Control": "no-cache" }
        });
        if (resp.status === 404) return null;
        if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
        const data = await resp.json();
        const content = atob(data.content);
        return { data: JSON.parse(content), sha: data.sha };
    }

    async function writeDataFile(newContent, sha) {
        if (!GITHUB_TOKEN) throw new Error("未设置 GitHub Token");
        const url = `https://api.github.com/repos/${CONFIG.repoOwner}/${CONFIG.repoName}/contents/${CONFIG.dataFile}`;
        const payload = { message: `更新数据 ${new Date().toLocaleString()}`, content: utf8ToBase64(JSON.stringify(newContent, null, 2)), branch: CONFIG.branch, sha: sha };
        const resp = await fetch(url, { method: "PUT", headers: { "Authorization": `Bearer ${GITHUB_TOKEN}`, "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        if (!resp.ok) throw new Error(`写入失败: ${resp.status}`);
        return (await resp.json()).content.sha;
    }

    async function saveData(newData, retries = 3) {
        for (let attempt = 1; attempt <= retries; attempt++) {
            try {
                const { sha } = await readDataFile();
                await writeDataFile(newData, sha);
                console.log("✅ 数据保存成功");
                return;
            } catch (err) {
                if (attempt === retries) throw err;
                console.warn(`保存失败重试 ${attempt}...`, err);
                await new Promise(r => setTimeout(r, 500 * attempt));
            }
        }
    }

    async function getFullData() {
        let fileInfo = await readDataFile();
        if (!fileInfo) {
            const defaultData = {
  "users": [
    {
      "username": "应急值班人员",
      "password": "123"
    }
  ],
  "meal_records": []
};
            let sha = null;
            try {
                const resp = await fetch(`https://api.github.com/repos/${CONFIG.repoOwner}/${CONFIG.repoName}/contents/${CONFIG.dataFile}`, { headers: { "Authorization": `Bearer ${GITHUB_TOKEN}` } });
                if (resp.status === 200) sha = (await resp.json()).sha;
            } catch(e) {}
            await writeDataFile(defaultData, sha);
            fileInfo = await readDataFile();
        }
        return fileInfo.data;
    }

    async function registerUser(username, password) {
        try {
            let data = await getFullData();
            if (data.users.find(u => u.username === username)) return { ok: false, msg: "用户名已存在" };
            data.users.push({ username, password });
            await saveData(data);
            await new Promise(r => setTimeout(r, 1500));
            const freshData = await getFullData();
            const found = freshData.users.find(u => u.username === username && u.password === password);
            if (!found) return { ok: false, msg: "注册写入成功但验证失败，请稍后重试" };
            return { ok: true };
        } catch (err) {
            console.error(err);
            return { ok: false, msg: `注册失败: ${err.message}` };
        }
    }

    async function loginUser(username, password) {
        try {
            const data = await getFullData();
            const user = data.users.find(u => u.username === username && u.password === password);
            if (user) return { ok: true };
            return { ok: false, msg: "用户名或密码错误" };
        } catch (err) {
            console.error(err);
            return { ok: false, msg: `登录失败: ${err.message}` };
        }
    }

    async function getUserRecordOnDate(username, date) {
        const data = await getFullData();
        const rec = data.meal_records.find(r => r.username === username && r.date === date);
        if (rec) return { breakfast: rec.breakfast, lunch: rec.lunch, dinner: rec.dinner };
        return { breakfast: 0, lunch: 0, dinner: 0 };
    }

    async function updateRecord(username, date, breakfast, lunch, dinner) {
        const data = await getFullData();
        const idx = data.meal_records.findIndex(r => r.username === username && r.date === date);
        const newRecord = { username, date, breakfast, lunch, dinner };
        if (idx !== -1) data.meal_records[idx] = newRecord;
        else data.meal_records.push(newRecord);
        await saveData(data);
    }

    async function getAllUsers() {
        const data = await getFullData();
        return data.users.map(u => ({ username: u.username }));
    }

    async function getAllTodayRecords() {
        const today = getTodayStr();
        const users = await getAllUsers();
        const records = [];
        for (let u of users) {
            const rec = await getUserRecordOnDate(u.username, today);
            records.push({ username: u.username, breakfast: rec.breakfast, lunch: rec.lunch, dinner: rec.dinner });
        }
        return records;
    }

    async function getMonthStats(yearMonth) {
        const data = await getFullData();
        const users = data.users;
        const monthRecords = data.meal_records.filter(r => r.date.startsWith(yearMonth));
        let stats = [], totalAll = 0;
        for (let u of users) {
            let breakfastTotal = 0, lunchTotal = 0, dinnerTotal = 0, money = 0;
            const userRecs = monthRecords.filter(r => r.username === u.username);
            for (let rec of userRecs) {
                breakfastTotal += rec.breakfast;
                lunchTotal += rec.lunch;
                dinnerTotal += rec.dinner;
                money += rec.breakfast * PRICES.breakfast + rec.lunch * PRICES.lunch + rec.dinner * PRICES.dinner;
            }
            stats.push({ username: u.username, breakfast_total: breakfastTotal, lunch_total: lunchTotal, dinner_total: dinnerTotal, total_money: money });
            totalAll += money;
        }
        return { stats, totalAll };
    }

    function getTodayStr() {
        let d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    async function renderToday() {
        let records = await getAllTodayRecords();
        const tbody = document.getElementById('todayTableBody');
        tbody.innerHTML = '';
        if (records.length === 0) { tbody.innerHTML = '<tr><td colspan="5">暂无数据</td></tr>'; document.getElementById('todayTableFoot').innerHTML = ''; return; }
        let sumB=0, sumL=0, sumD=0, sumMoney=0;
        for (let r of records) {
            let total = r.breakfast*1 + r.lunch*3 + r.dinner*2;
            sumB += r.breakfast; sumL += r.lunch; sumD += r.dinner; sumMoney += total;
            let row = `<tr><td>${escapeHtml(r.username)}</td><td>${r.breakfast}</td><td>${r.lunch}</td><td>${r.dinner}</td><td>¥${total.toFixed(2)}</td></tr>`;
            tbody.insertAdjacentHTML('beforeend', row);
        }
        document.getElementById('todayTableFoot').innerHTML = `<tr style="background:#eef2ff;font-weight:bold"><td>总计</td><td>${sumB}</td><td>${sumL}</td><td>${sumD}</td><td>¥${sumMoney.toFixed(2)}</td></tr>`;
        document.getElementById('todayDateLabel').innerText = getTodayStr();
    }

    async function renderMonth(yearMonth) {
        if (!yearMonth || !/^\d{4}-\d{2}$/.test(yearMonth)) {
            document.getElementById('monthTableBody').innerHTML = '<tr><td colspan="5">月份格式错误</td></tr>';
            return;
        }
        let { stats, totalAll } = await getMonthStats(yearMonth);
        currentMonthCache = stats;
        const tbody = document.getElementById('monthTableBody');
        tbody.innerHTML = '';
        if (stats.length === 0) { tbody.innerHTML = '<tr><td colspan="5">暂无数据</td></tr>'; document.getElementById('monthTableFoot').innerHTML = ''; return; }
        let sumB=0, sumL=0, sumD=0;
        for (let s of stats) {
            sumB += s.breakfast_total; sumL += s.lunch_total; sumD += s.dinner_total;
            let row = `<tr><td>${escapeHtml(s.username)}</td><td>${s.breakfast_total}</td><td>${s.lunch_total}</td><td>${s.dinner_total}</td><td>¥${s.total_money.toFixed(2)}</td></tr>`;
            tbody.insertAdjacentHTML('beforeend', row);
        }
        document.getElementById('monthTableFoot').innerHTML = `<tr style="background:#eef2ff;font-weight:bold"><td>总计</td><td>${sumB}</td><td>${sumL}</td><td>${sumD}</td><td>¥${totalAll.toFixed(2)}</td></tr>`;
        let userStat = stats.find(s => s.username === currentUser);
        let total = userStat ? userStat.total_money : 0;
        document.getElementById('monthTotalAmount').innerText = `本月本人总消费: ¥${total.toFixed(2)}`;
    }

    function openEditModal() {
        if (!currentUser) { alert('请先登录'); return; }
        let today = getTodayStr();
        getUserRecordOnDate(currentUser, today).then(rec => {
            let modal = document.createElement('div');
            modal.className = 'modal-mask';
            modal.innerHTML = `
                <div class="modal-container">
                    <div class="modal-header"><span>📝 编辑今日订餐 (${today}) - ${escapeHtml(currentUser)}</span><button id="closeModalBtn" style="background:transparent;font-size:24px">&times;</button></div>
                    <div class="modal-body">
                        <div>🥐 早餐 <input type="number" min="0" max="10" id="editBreakfast" value="${rec.breakfast}"></div>
                        <div>🍱 午餐 <input type="number" min="0" max="10" id="editLunch" value="${rec.lunch}"></div>
                        <div>🍝 晚餐 <input type="number" min="0" max="10" id="editDinner" value="${rec.dinner}"></div>
                        <div style="margin-top:12px;font-size:13px;">💡 价格：早餐¥1，午餐¥3，晚餐¥2</div>
                    </div>
                    <div class="modal-footer"><button id="cancelModalBtn" class="btn-outline">取消</button><button id="saveMealBtn" class="btn-success">保存</button></div>
                </div>
            `;
            document.body.appendChild(modal);
            const closeModal = () => modal.remove();
            modal.querySelector('#closeModalBtn').onclick = closeModal;
            modal.querySelector('#cancelModalBtn').onclick = closeModal;
            modal.querySelector('#saveMealBtn').onclick = async () => {
                let b = parseInt(modal.querySelector('#editBreakfast').value) || 0;
                let l = parseInt(modal.querySelector('#editLunch').value) || 0;
                let d = parseInt(modal.querySelector('#editDinner').value) || 0;
                if (b<0||b>10||l<0||l>10||d<0||d>10) { alert('份数须在0-10之间'); return; }
                await updateRecord(currentUser, today, b, l, d);
                alert('✅ 订餐修改成功！');
                closeModal();
                await renderToday();
                if (document.getElementById('monthPicker').value && today.startsWith(document.getElementById('monthPicker').value))
                    await renderMonth(document.getElementById('monthPicker').value);
            };
            modal.onclick = (e) => { if (e.target === modal) closeModal(); };
        });
    }

    function printTable(title, headers, rows, footRow) {
        let win = window.open('', '_blank');
        let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title><style>body{font-family:system-ui;margin:2rem;}table{border-collapse:collapse;width:100%;}th,td{border:1px solid #aaa;padding:8px;text-align:center;}th{background:#f2f2f2;}</style></head><body><h2>${title}</h2><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>${footRow ? `<tfoot><tr>${footRow.map(c=>`<td><strong>${c}</strong></td>`).join('')}</tr></tfoot>` : ''}</table><div style="margin-top:20px;">打印时间: ${new Date().toLocaleString()}</div></body></html>`;
        win.document.write(html);
        win.document.close();
        win.print();
    }

    function exportCSV(title, headers, rows, footRow, filename) {
        let csv = "\uFEFF" + title + "\n\n" + headers.join(',') + "\n";
        for (let r of rows) csv += r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',') + "\n";
        if (footRow) csv += footRow.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',') + "\n";
        let blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
        let a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    async function handlePrintToday() {
        let records = await getAllTodayRecords();
        if (!records.length) { alert('无今日数据'); return; }
        let sumB=0,sumL=0,sumD=0,sumM=0;
        let rows = records.map(r => { let total = r.breakfast*1 + r.lunch*3 + r.dinner*2; sumB+=r.breakfast; sumL+=r.lunch; sumD+=r.dinner; sumM+=total; return [r.username, r.breakfast, r.lunch, r.dinner, `¥${total.toFixed(2)}`]; });
        printTable(`今日订餐概览 (${getTodayStr()})`, ['姓名','早餐','午餐','晚餐','合计'], rows, ['总计', sumB, sumL, sumD, `¥${sumM.toFixed(2)}`]);
    }

    async function handleExportToday() {
        let records = await getAllTodayRecords();
        let rows = records.map(r => [r.username, r.breakfast, r.lunch, r.dinner, (r.breakfast*1 + r.lunch*3 + r.dinner*2)]);
        let sumB=0,sumL=0,sumD=0,sumM=0;
        rows.forEach(r=>{ sumB+=r[1]; sumL+=r[2]; sumD+=r[3]; sumM+=r[4]; });
        exportCSV(`订餐日报_${getTodayStr()}`, ['姓名','早餐','午餐','晚餐','合计(元)'], rows, ['总计', sumB, sumL, sumD, sumM], `订餐日报_${getTodayStr()}.csv`);
    }

    async function handlePrintMonth() {
        if (!currentMonthCache || !currentMonthCache.length) { alert('请先刷新月度数据'); return; }
        let sumB=0,sumL=0,sumD=0,sumM=0;
        let rows = currentMonthCache.map(s => { sumB+=s.breakfast_total; sumL+=s.lunch_total; sumD+=s.dinner_total; sumM+=s.total_money; return [s.username, s.breakfast_total, s.lunch_total, s.dinner_total, `¥${s.total_money.toFixed(2)}`]; });
        printTable(`月度统计报表 (${document.getElementById('monthPicker').value})`, ['姓名','早餐总份','午餐总份','晚餐总份','月消费'], rows, ['总计', sumB, sumL, sumD, `¥${sumM.toFixed(2)}`]);
    }

    function handleExportMonth() {
        if (!currentMonthCache || !currentMonthCache.length) { alert('无月度数据'); return; }
        let rows = currentMonthCache.map(s => [s.username, s.breakfast_total, s.lunch_total, s.dinner_total, s.total_money]);
        let sumB=0,sumL=0,sumD=0,sumM=0;
        rows.forEach(r=>{ sumB+=r[1]; sumL+=r[2]; sumD+=r[3]; sumM+=r[4]; });
        exportCSV(`订餐月报_${document.getElementById('monthPicker').value}`, ['姓名','早餐总份','午餐总份','晚餐总份','月消费(元)'], rows, ['总计', sumB, sumL, sumD, sumM], `订餐月报_${document.getElementById('monthPicker').value}.csv`);
    }

    async function testConnection() {
        const msgDiv = document.getElementById('diagnosticMsg');
        msgDiv.innerHTML = "⏳ 正在测试仓库连接...";
        msgDiv.className = "info-msg";
        try {
            await getFullData();
            msgDiv.innerHTML = "✅ GitHub 仓库连接正常，数据文件可用。";
            msgDiv.className = "info-msg";
            return true;
        } catch(e) {
            msgDiv.innerHTML = `❌ 连接失败: ${e.message}。请检查 Token 或仓库设置。`;
            msgDiv.className = "error-msg-box";
            return false;
        }
    }

    async function initMain() {
        document.getElementById('authView').classList.add('hidden');
        document.getElementById('mainView').classList.remove('hidden');
        document.getElementById('welcomeUser').innerText = `👋 欢迎, ${currentUser}`;
        let now = new Date();
        let defaultMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
        document.getElementById('monthPicker').value = defaultMonth;
        await renderToday();
        await renderMonth(defaultMonth);
        document.getElementById('refreshTodayBtn').onclick = () => renderToday();
        document.getElementById('printTodayBtn').onclick = handlePrintToday;
        document.getElementById('exportTodayBtn').onclick = handleExportToday;
        document.getElementById('printMonthBtn').onclick = handlePrintMonth;
        document.getElementById('exportMonthBtn').onclick = handleExportMonth;
        document.getElementById('refreshMonthBtn').onclick = () => { let m = document.getElementById('monthPicker').value; if(/^\d{4}-\d{2}$/.test(m)) renderMonth(m); else alert('月份格式YYYY-MM'); };
        document.getElementById('editTodayBtn').onclick = openEditModal;
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; document.getElementById('authView').classList.remove('hidden'); document.getElementById('mainView').classList.add('hidden'); document.getElementById('loginForm').classList.remove('hidden'); document.getElementById('registerForm').classList.add('hidden'); };
    }

    function saveTokenToStorage(token, repoOwner, repoName, branch) {
        localStorage.setItem('github_token', token);
        localStorage.setItem('repo_owner', repoOwner);
        localStorage.setItem('repo_name', repoName);
        localStorage.setItem('branch', branch);
        CONFIG.repoOwner = repoOwner;
        CONFIG.repoName = repoName;
        CONFIG.branch = branch;
        GITHUB_TOKEN = token;
    }

    function loadTokenFromStorage() {
        const token = localStorage.getItem('github_token');
        const owner = localStorage.getItem('repo_owner');
        const name = localStorage.getItem('repo_name');
        const branch = localStorage.getItem('branch');
        if (token && owner && name && branch) {
            GITHUB_TOKEN = token;
            CONFIG.repoOwner = owner;
            CONFIG.repoName = name;
            CONFIG.branch = branch;
            return true;
        }
        return false;
    }

    function clearToken() {
        localStorage.removeItem('github_token');
        localStorage.removeItem('repo_owner');
        localStorage.removeItem('repo_name');
        localStorage.removeItem('branch');
        GITHUB_TOKEN = null;
    }

    function showTokenPanel() {
        document.getElementById('tokenPanel').classList.remove('hidden');
        document.getElementById('authView').classList.add('hidden');
        document.getElementById('mainView').classList.add('hidden');
        document.getElementById('repoOwnerInput').value = CONFIG.repoOwner;
        document.getElementById('repoNameInput').value = CONFIG.repoName;
        document.getElementById('branchInput').value = CONFIG.branch;
    }

    function hideTokenPanel() {
        document.getElementById('tokenPanel').classList.add('hidden');
    }

    async function onSaveToken() {
        const token = document.getElementById('githubTokenInput').value.trim();
        const owner = document.getElementById('repoOwnerInput').value.trim();
        const name = document.getElementById('repoNameInput').value.trim();
        const branch = document.getElementById('branchInput').value.trim();
        const errDiv = document.getElementById('tokenError');
        if (!token || !owner || !name || !branch) {
            errDiv.innerText = '所有字段都必须填写';
            errDiv.classList.remove('hidden');
            return;
        }
        errDiv.classList.add('hidden');
        const oldToken = GITHUB_TOKEN;
        GITHUB_TOKEN = token;
        CONFIG.repoOwner = owner;
        CONFIG.repoName = name;
        CONFIG.branch = branch;
        try {
            await getFullData();
            saveTokenToStorage(token, owner, name, branch);
            hideTokenPanel();
            document.getElementById('authView').classList.remove('hidden');
            await testConnection();
        } catch (e) {
            errDiv.innerText = `连接失败: ${e.message}。请检查 Token 权限或仓库信息。`;
            errDiv.classList.remove('hidden');
            GITHUB_TOKEN = oldToken;
            CONFIG.repoOwner = localStorage.getItem('repo_owner') || "lylmyself";
            CONFIG.repoName = localStorage.getItem('repo_name') || "weather-reports";
            CONFIG.branch = localStorage.getItem('branch') || "main";
        }
    }

    function onResetToken() {
        clearToken();
        showTokenPanel();
        currentUser = null;
    }

    window.onload = async () => {
        // 检查是否有存储的 token
        if (loadTokenFromStorage()) {
            // 有存储，尝试连接
            hideTokenPanel();
            document.getElementById('authView').classList.remove('hidden');
            const connected = await testConnection();
            if (!connected) {
                // 连接失败，说明 token 无效或仓库信息错误，清除存储并显示 token 设置面板
                console.warn("连接失败，清除无效 token 并显示设置面板");
                clearToken();
                showTokenPanel();
            }
        } else {
            // 无存储，直接显示 token 设置面板
            showTokenPanel();
        }

        // 绑定按钮事件
        document.getElementById('btnSaveToken').onclick = onSaveToken;
        document.getElementById('btnResetToken').onclick = onResetToken;
        document.getElementById('btnTestConnection').onclick = async () => { await testConnection(); };

        // 登录/注册事件
        document.getElementById('btnLogin').onclick = async () => {
            let user = document.getElementById('loginUsername').value.trim();
            let pwd = document.getElementById('loginPassword').value;
            let errDiv = document.getElementById('loginError');
            if (!user || !pwd) { errDiv.innerText = '用户名/密码不能为空'; errDiv.classList.remove('hidden'); setTimeout(()=>errDiv.classList.add('hidden'),3000); return; }
            let res = await loginUser(user, pwd);
            if (res.ok) {
                currentUser = user;
                if (document.getElementById('rememberCheckbox').checked) { localStorage.setItem('savedUser', user); localStorage.setItem('savedPwd', pwd); }
                else { localStorage.removeItem('savedUser'); localStorage.removeItem('savedPwd'); }
                await initMain();
            } else { errDiv.innerText = res.msg; errDiv.classList.remove('hidden'); setTimeout(()=>errDiv.classList.add('hidden'),3000); }
        };
        document.getElementById('btnShowRegister').onclick = () => { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerForm').classList.remove('hidden'); };
        document.getElementById('btnBackLogin').onclick = () => { document.getElementById('registerForm').classList.add('hidden'); document.getElementById('loginForm').classList.remove('hidden'); };
        document.getElementById('btnRegister').onclick = async () => {
            let user = document.getElementById('regUsername').value.trim();
            let pwd = document.getElementById('regPassword').value;
            let pwd2 = document.getElementById('regConfirmPwd').value;
            let errDiv = document.getElementById('regError');
            if (!user || !pwd) { errDiv.innerText = '用户名/密码不能为空'; errDiv.classList.remove('hidden'); setTimeout(()=>errDiv.classList.add('hidden'),3000); return; }
            if (pwd !== pwd2) { errDiv.innerText = '两次密码不一致'; errDiv.classList.remove('hidden'); setTimeout(()=>errDiv.classList.add('hidden'),3000); return; }
            let res = await registerUser(user, pwd);
            if (res.ok) {
                alert('注册成功，请登录');
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('loginUsername').value = user;
                document.getElementById('loginPassword').value = '';
            } else { errDiv.innerText = res.msg; errDiv.classList.remove('hidden'); setTimeout(()=>errDiv.classList.add('hidden'),3000); }
        };
        let savedUser = localStorage.getItem('savedUser');
        let savedPwd = localStorage.getItem('savedPwd');
        if (savedUser && savedPwd) { document.getElementById('loginUsername').value = savedUser; document.getElementById('loginPassword').value = savedPwd; document.getElementById('rememberCheckbox').checked = true; }
    };
</script>
</body>
</html>
