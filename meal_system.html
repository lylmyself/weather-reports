<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>单位订餐系统（本地存储版）</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,'Segoe UI',Roboto,sans-serif}
        body{background:#eef2f7;padding:20px}
        .app-container{max-width:1400px;margin:0 auto;background:#fff;border-radius:28px;box-shadow:0 20px 35px -12px rgba(0,0,0,0.15);padding:24px 28px 32px}
        .auth-panel{max-width:480px;margin:60px auto;background:#fff;border-radius:36px;padding:36px 32px;box-shadow:0 20px 35px -10px rgba(0,0,0,0.2);text-align:center}
        .form-group{margin-bottom:20px;text-align:left}
        .form-group input{width:100%;padding:12px 16px;border:1px solid #cbd5e1;border-radius:28px;font-size:16px}
        .checkbox-group{display:flex;align-items:center;gap:12px;margin:15px 0;justify-content:center}
        .checkbox-group input{width:20px;height:20px;margin:0;cursor:pointer}
        .checkbox-group label{font-size:16px;cursor:pointer;margin:0}
        button{background:#3b82f6;color:#fff;border:none;padding:10px 24px;border-radius:40px;font-weight:600;cursor:pointer;font-size:14px;margin:4px 6px}
        button:hover{background:#2563eb}
        .btn-outline{background:#fff;color:#3b82f6;border:1px solid #3b82f6}
        .btn-outline:hover{background:#eff6ff}
        .btn-danger{background:#ef4444}
        .btn-danger:hover{background:#dc2626}
        .btn-sm{padding:6px 16px;font-size:13px}
        .btn-success{background:#10b981}
        .btn-success:hover{background:#059669}
        .main-header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid #e2e8f0;padding-bottom:14px;margin-bottom:24px;flex-wrap:wrap;gap:12px}
        .user-greeting{font-weight:600;background:#eef2ff;padding:6px 18px;border-radius:40px;font-size:14px}
        .stats-card{background:#f8fafc;border-radius:24px;padding:16px 24px;margin-bottom:28px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px}
        .tabs{display:flex;gap:4px;border-bottom:2px solid #e2e8f0;margin-bottom:20px}
        .tab-btn{background:none;border:none;padding:12px 24px;font-size:16px;font-weight:600;color:#64748b;cursor:pointer;border-radius:8px 8px 0 0;transition:all 0.2s}
        .tab-btn.active{color:#3b82f6;background:#eff6ff;border-bottom:2px solid #3b82f6;margin-bottom:-2px}
        .tab-pane{display:none}
        .tab-pane.active{display:block}
        .section-title{font-size:1.2rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
        .toolbar{display:flex;gap:10px;flex-wrap:wrap}
        .table-wrapper{overflow-x:auto;border-radius:20px;border:1px solid #e2e8f0;background:#fff;max-height:500px;overflow-y:auto}
        table{width:100%;border-collapse:collapse;font-size:14px}
        th{background:#f1f5f9;padding:12px 10px;position:sticky;top:0;border-bottom:1px solid #cbd5e1}
        td,th{padding:10px 8px;text-align:center;border-bottom:1px solid #eef2ff}
        tfoot td{background:#eef2ff;font-weight:bold;border-top:2px solid #cbd5e1}
        tr:hover{background:#fefce8}
        .modal-mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:1000}
        .modal-container{background:#fff;width:90%;max-width:500px;border-radius:36px;overflow:hidden}
        .modal-header{padding:18px 24px;background:#f8fafc;border-bottom:1px solid #e2e8f0;font-weight:700;font-size:1.2rem;display:flex;justify-content:space-between}
        .modal-body{padding:20px}
        .meal-spin-group{display:flex;gap:20px;flex-wrap:wrap;margin-top:10px;justify-content:center}
        .spin-item{background:#f1f5f9;padding:8px 15px;border-radius:40px;display:flex;align-items:center;gap:10px}
        .spin-input{width:80px;padding:8px;border-radius:28px;border:1px solid #cbd5e1;text-align:center;font-size:16px}
        .modal-footer{padding:16px 24px;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:12px}
        .error-msg{color:#b91c1c;background:#fee2e2;border-radius:40px;padding:8px 16px;margin-top:12px;font-size:13px}
        .hidden{display:none}
        footer{text-align:center;font-size:12px;color:#94a3b8;margin-top:30px}
        .info-msg{background:#e6f7e6;border-left:4px solid #10b981;padding:10px;margin-bottom:20px;font-size:13px;text-align:left}
        .error-msg-box{background:#fee2e2;border-left:4px solid #dc2626;padding:10px;margin-bottom:20px}
        .data-tools{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}
        @media(max-width:700px){.app-container{padding:18px}.stats-card{flex-direction:column;align-items:stretch}}
    </style>
</head>
<body>
<div id="app">
    <div id="authView" class="auth-panel">
        <h2>🍜 单位订餐系统</h2>
        <div id="diagnosticMsg" class="info-msg">📦 数据存储于浏览器本地，多设备数据不互通。可导出/导入备份。</div>
        <div id="loginForm">
            <div class="form-group"><label>用户名</label><input type="text" id="loginUsername" placeholder="请输入用户名"></div>
            <div class="form-group"><label>密码</label><input type="password" id="loginPassword" placeholder="密码"></div>
            <div class="checkbox-group">
                <input type="checkbox" id="rememberCheckbox">
                <label for="rememberCheckbox">记住密码</label>
            </div>
            <button id="btnLogin">登录</button>
            <button id="btnShowRegister" class="btn-outline">注册新账号</button>
            <div id="loginError" class="error-msg hidden"></div>
        </div>
        <div id="registerForm" class="hidden">
            <div class="form-group"><label>用户名</label><input type="text" id="regUsername" placeholder="用户名"></div>
            <div class="form-group"><label>密码</label><input type="password" id="regPassword" placeholder="密码"></div>
            <div class="form-group"><label>确认密码</label><input type="password" id="regConfirmPwd" placeholder="再次输入密码"></div>
            <button id="btnRegister">注册</button>
            <button id="btnBackLogin" class="btn-outline">返回登录</button>
            <div id="regError" class="error-msg hidden"></div>
        </div>
        <div class="data-tools">
            <button id="exportDataBtn" class="btn-sm btn-outline">📁 导出数据备份</button>
            <button id="importDataBtn" class="btn-sm btn-outline">📂 导入数据恢复</button>
            <input type="file" id="importFileInput" accept=".json" style="display:none">
        </div>
    </div>

    <div id="mainView" class="app-container hidden">
        <div class="main-header">
            <span class="user-greeting" id="welcomeUser">👋 用户</span>
            <button id="logoutBtn" class="btn-danger btn-sm">退出登录</button>
        </div>
        <div class="stats-card">
            <div style="display:flex;gap:12px;align-items:center;">
                <span>📅 统计月份：</span>
                <input type="month" id="monthPicker" style="padding:6px 12px;border-radius:40px;border:1px solid #cbd5e1;">
                <button id="refreshMonthBtn" class="btn-sm">刷新</button>
            </div>
            <div id="monthTotalAmount" style="font-weight:700;background:#dbeafe;padding:6px 20px;border-radius:40px;">本月本人总消费: ¥0.00</div>
            <button id="editTodayBtn" class="btn-success btn-sm">✏️ 修改今日订餐</button>
        </div>

        <!-- 选项卡 -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="today">📋 今日订餐</button>
            <button class="tab-btn" data-tab="month">📊 月度统计</button>
        </div>

        <!-- 今日订餐面板 -->
        <div id="tab-today" class="tab-pane active">
            <div class="section-title">
                <span>今日日期：<span id="todayDateLabel"></span></span>
                <div class="toolbar">
                    <button id="refreshTodayBtn" class="btn-sm">刷新</button>
                    <button id="printTodayBtn" class="btn-sm">打印</button>
                    <button id="exportTodayBtn" class="btn-sm">导出CSV</button>
                </div>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>姓名</th><th>早餐</th><th>午餐</th><th>晚餐</th><th>合计(元)</th></tr></thead>
                    <tbody id="todayTableBody"><tr><td colspan="5">加载中...</td></tr></tbody>
                    <tfoot id="todayTableFoot"></tfoot>
                </table>
            </div>
        </div>

        <!-- 月度统计面板 -->
        <div id="tab-month" class="tab-pane">
            <div class="section-title">
                <span>月度统计报表</span>
                <div class="toolbar">
                    <button id="printMonthBtn" class="btn-sm">打印月报</button>
                    <button id="exportMonthBtn" class="btn-sm">导出CSV</button>
                </div>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>姓名</th><th>早餐总份</th><th>午餐总份</th><th>晚餐总份</th><th>月消费(元)</th></tr></thead>
                    <tbody id="monthTableBody"><tr><td colspan="5">请选择月份</td></tr></tbody>
                    <tfoot id="monthTableFoot"></tfoot>
                </table>
            </div>
        </div>

        <footer>⚡ 所有数据仅保存在当前浏览器中，更换设备或清除缓存将丢失。请定期导出备份。</footer>
    </div>
</div>
<script>
    const PRICES = { breakfast: 1.0, lunch: 3.0, dinner: 2.0 };
    let currentUser = null;
    let currentMonthCache = null;

    // ---------- 默认数据 ----------
    const DEFAULT_USERS = [
        { username: "应急值班人员", password: "123" }
    ];
    const DEFAULT_MEAL_RECORDS = [];

    // ---------- localStorage 操作 ----------
    function loadData() {
        let users = localStorage.getItem('meal_users');
        let records = localStorage.getItem('meal_records');
        if (!users) {
            users = DEFAULT_USERS;
            localStorage.setItem('meal_users', JSON.stringify(users));
        } else {
            users = JSON.parse(users);
        }
        if (!records) {
            records = DEFAULT_MEAL_RECORDS;
            localStorage.setItem('meal_records', JSON.stringify(records));
        } else {
            records = JSON.parse(records);
        }
        return { users, records };
    }

    function saveUsers(users) {
        localStorage.setItem('meal_users', JSON.stringify(users));
    }

    function saveRecords(records) {
        localStorage.setItem('meal_records', JSON.stringify(records));
    }

    function getFullData() {
        return loadData();
    }

    async function registerUser(username, password) {
        let { users, records } = loadData();
        if (users.find(u => u.username === username)) return { ok: false, msg: "用户名已存在" };
        users.push({ username, password });
        saveUsers(users);
        return { ok: true };
    }

    async function loginUser(username, password) {
        let { users } = loadData();
        const user = users.find(u => u.username === username && u.password === password);
        if (user) return { ok: true };
        return { ok: false, msg: "用户名或密码错误" };
    }

    async function getUserRecordOnDate(username, date) {
        let { records } = loadData();
        const rec = records.find(r => r.username === username && r.date === date);
        if (rec) return { breakfast: rec.breakfast, lunch: rec.lunch, dinner: rec.dinner };
        return { breakfast: 0, lunch: 0, dinner: 0 };
    }

    async function updateRecord(username, date, breakfast, lunch, dinner) {
        let { records } = loadData();
        const idx = records.findIndex(r => r.username === username && r.date === date);
        const newRecord = { username, date, breakfast, lunch, dinner };
        if (idx !== -1) records[idx] = newRecord;
        else records.push(newRecord);
        saveRecords(records);
    }

    async function getAllUsers() {
        let { users } = loadData();
        return users.map(u => ({ username: u.username }));
    }

    async function getAllTodayRecords() {
        const today = getTodayStr();
        const users = await getAllUsers();
        const records = [];
        for (let u of users) {
            const rec = await getUserRecordOnDate(u.username, today);
            records.push({ username: u.username, breakfast: rec.breakfast, lunch: rec.lunch, dinner: rec.dinner });
        }
        return records;
    }

    async function getMonthStats(yearMonth) {
        let { users, records } = loadData();
        const monthRecords = records.filter(r => r.date.startsWith(yearMonth));
        let stats = [], totalAll = 0;
        for (let u of users) {
            let breakfastTotal = 0, lunchTotal = 0, dinnerTotal = 0, money = 0;
            const userRecs = monthRecords.filter(r => r.username === u.username);
            for (let rec of userRecs) {
                breakfastTotal += rec.breakfast;
                lunchTotal += rec.lunch;
                dinnerTotal += rec.dinner;
                money += rec.breakfast * PRICES.breakfast + rec.lunch * PRICES.lunch + rec.dinner * PRICES.dinner;
            }
            stats.push({ username: u.username, breakfast_total: breakfastTotal, lunch_total: lunchTotal, dinner_total: dinnerTotal, total_money: money });
            totalAll += money;
        }
        return { stats, totalAll };
    }

    function getTodayStr() {
        let d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    // ---------- 渲染 ----------
    async function renderToday() {
        let records = await getAllTodayRecords();
        const tbody = document.getElementById('todayTableBody');
        tbody.innerHTML = '';
        if (records.length === 0) { tbody.innerHTML = '<tr><td colspan="5">暂无数据</td></tr>'; document.getElementById('todayTableFoot').innerHTML = ''; return; }
        let sumB=0, sumL=0, sumD=0, sumMoney=0;
        for (let r of records) {
            let total = r.breakfast*1 + r.lunch*3 + r.dinner*2;
            sumB += r.breakfast; sumL += r.lunch; sumD += r.dinner; sumMoney += total;
            let row = `<tr><td>${escapeHtml(r.username)}</td><td>${r.breakfast}</td><td>${r.lunch}</td><td>${r.dinner}</td><td>¥${total.toFixed(2)}</td></tr>`;
            tbody.insertAdjacentHTML('beforeend', row);
        }
        document.getElementById('todayTableFoot').innerHTML = `<tr style="background:#eef2ff;font-weight:bold"><td>总计</td><td>${sumB}</td><td>${sumL}</td><td>${sumD}</td><td>¥${sumMoney.toFixed(2)}</td></tr>`;
        document.getElementById('todayDateLabel').innerText = getTodayStr();
    }

    async function renderMonth(yearMonth) {
        if (!yearMonth || !/^\d{4}-\d{2}$/.test(yearMonth)) {
            document.getElementById('monthTableBody').innerHTML = '<tr><td colspan="5">月份格式错误</td></tr>';
            return;
        }
        let { stats, totalAll } = await getMonthStats(yearMonth);
        currentMonthCache = stats;
        const tbody = document.getElementById('monthTableBody');
        tbody.innerHTML = '';
        if (stats.length === 0) { tbody.innerHTML = '<tr><td colspan="5">暂无数据</td></tr>'; document.getElementById('monthTableFoot').innerHTML = ''; return; }
        let sumB=0, sumL=0, sumD=0;
        for (let s of stats) {
            sumB += s.breakfast_total; sumL += s.lunch_total; sumD += s.dinner_total;
            let row = `<tr><td>${escapeHtml(s.username)}</td><td>${s.breakfast_total}</td><td>${s.lunch_total}</td><td>${s.dinner_total}</td><td>¥${s.total_money.toFixed(2)}</td></tr>`;
            tbody.insertAdjacentHTML('beforeend', row);
        }
        document.getElementById('monthTableFoot').innerHTML = `<tr style="background:#eef2ff;font-weight:bold"><td>总计</td><td>${sumB}</td><td>${sumL}</td><td>${sumD}</td><td>¥${totalAll.toFixed(2)}</td></tr>`;
        let userStat = stats.find(s => s.username === currentUser);
        let total = userStat ? userStat.total_money : 0;
        document.getElementById('monthTotalAmount').innerText = `本月本人总消费: ¥${total.toFixed(2)}`;
    }

    function openEditModal() {
        if (!currentUser) { alert('请先登录'); return; }
        let today = getTodayStr();
        getUserRecordOnDate(currentUser, today).then(rec => {
            let modal = document.createElement('div');
            modal.className = 'modal-mask';
            modal.innerHTML = `
                <div class="modal-container">
                    <div class="modal-header">
                        <span>📝 编辑今日订餐 (${today}) - ${escapeHtml(currentUser)}</span>
                        <button id="closeModalBtn" style="background:transparent;font-size:24px;padding:0;">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="meal-spin-group">
                            <div class="spin-item">🥐 早餐 <input type="number" min="0" max="10" id="editBreakfast" class="spin-input" value="${rec.breakfast}"></div>
                            <div class="spin-item">🍱 午餐 <input type="number" min="0" max="10" id="editLunch" class="spin-input" value="${rec.lunch}"></div>
                            <div class="spin-item">🍝 晚餐 <input type="number" min="0" max="10" id="editDinner" class="spin-input" value="${rec.dinner}"></div>
                        </div>
                        <div style="margin-top:16px;text-align:center;color:#475569;">💡 价格：早餐¥1，午餐¥3，晚餐¥2</div>
                    </div>
                    <div class="modal-footer">
                        <button id="cancelModalBtn" class="btn-outline">取消</button>
                        <button id="saveMealBtn" class="btn-success">保存</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            const closeModal = () => modal.remove();
            modal.querySelector('#closeModalBtn').onclick = closeModal;
            modal.querySelector('#cancelModalBtn').onclick = closeModal;
            modal.querySelector('#saveMealBtn').onclick = async () => {
                let b = parseInt(modal.querySelector('#editBreakfast').value) || 0;
                let l = parseInt(modal.querySelector('#editLunch').value) || 0;
                let d = parseInt(modal.querySelector('#editDinner').value) || 0;
                if (b<0||b>10||l<0||l>10||d<0||d>10) { alert('份数须在0-10之间'); return; }
                await updateRecord(currentUser, today, b, l, d);
                alert('✅ 订餐修改成功！');
                closeModal();
                await renderToday();
                if (document.getElementById('monthPicker').value && today.startsWith(document.getElementById('monthPicker').value))
                    await renderMonth(document.getElementById('monthPicker').value);
            };
            modal.onclick = (e) => { if (e.target === modal) closeModal(); };
        });
    }

    // 打印与导出
    function printTable(title, headers, rows, footRow) {
        let win = window.open('', '_blank');
        let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title><style>body{font-family:system-ui;margin:2rem;}table{border-collapse:collapse;width:100%;}th,td{border:1px solid #aaa;padding:8px;text-align:center;}th{background:#f2f2f2;}tfoot td{background:#eef2ff;font-weight:bold;}</style></head><body><h2>${title}</h2><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>${footRow ? `<tfoot><tr>${footRow.map(c=>`<td><strong>${c}</strong></td>`).join('')}</tr></tfoot>` : ''}</table><div style="margin-top:20px;text-align:right;">打印时间: ${new Date().toLocaleString()}</div></body></html>`;
        win.document.write(html);
        win.document.close();
        win.print();
    }

    function exportCSV(title, headers, rows, footRow, filename) {
        let csv = "\uFEFF" + title + "\n\n" + headers.join(',') + "\n";
        for (let r of rows) csv += r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',') + "\n";
        if (footRow) csv += footRow.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',') + "\n";
        let blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
        let a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    async function handlePrintToday() {
        let records = await getAllTodayRecords();
        if (!records.length) { alert('无今日数据'); return; }
        let sumB=0,sumL=0,sumD=0,sumM=0;
        let rows = records.map(r => { let total = r.breakfast*1 + r.lunch*3 + r.dinner*2; sumB+=r.breakfast; sumL+=r.lunch; sumD+=r.dinner; sumM+=total; return [r.username, r.breakfast, r.lunch, r.dinner, `¥${total.toFixed(2)}`]; });
        printTable(`今日订餐概览 (${getTodayStr()})`, ['姓名','早餐','午餐','晚餐','合计'], rows, ['总计', sumB, sumL, sumD, `¥${sumM.toFixed(2)}`]);
    }

    async function handleExportToday() {
        let records = await getAllTodayRecords();
        let rows = records.map(r => [r.username, r.breakfast, r.lunch, r.dinner, (r.breakfast*1 + r.lunch*3 + r.dinner*2)]);
        let sumB=0,sumL=0,sumD=0,sumM=0;
        rows.forEach(r=>{ sumB+=r[1]; sumL+=r[2]; sumD+=r[3]; sumM+=r[4]; });
        exportCSV(`订餐日报_${getTodayStr()}`, ['姓名','早餐','午餐','晚餐','合计(元)'], rows, ['总计', sumB, sumL, sumD, sumM], `订餐日报_${getTodayStr()}.csv`);
    }

    async function handlePrintMonth() {
        if (!currentMonthCache || !currentMonthCache.length) { alert('请先刷新月度数据'); return; }
        let sumB=0,sumL=0,sumD=0,sumM=0;
        let rows = currentMonthCache.map(s => { sumB+=s.breakfast_total; sumL+=s.lunch_total; sumD+=s.dinner_total; sumM+=s.total_money; return [s.username, s.breakfast_total, s.lunch_total, s.dinner_total, `¥${s.total_money.toFixed(2)}`]; });
        printTable(`月度统计报表 (${document.getElementById('monthPicker').value})`, ['姓名','早餐总份','午餐总份','晚餐总份','月消费'], rows, ['总计', sumB, sumL, sumD, `¥${sumM.toFixed(2)}`]);
    }

    function handleExportMonth() {
        if (!currentMonthCache || !currentMonthCache.length) { alert('无月度数据'); return; }
        let rows = currentMonthCache.map(s => [s.username, s.breakfast_total, s.lunch_total, s.dinner_total, s.total_money]);
        let sumB=0,sumL=0,sumD=0,sumM=0;
        rows.forEach(r=>{ sumB+=r[1]; sumL+=r[2]; sumD+=r[3]; sumM+=r[4]; });
        exportCSV(`订餐月报_${document.getElementById('monthPicker').value}`, ['姓名','早餐总份','午餐总份','晚餐总份','月消费(元)'], rows, ['总计', sumB, sumL, sumD, sumM], `订餐月报_${document.getElementById('monthPicker').value}.csv`);
    }

    // 数据备份
    function exportBackup() {
        const users = localStorage.getItem('meal_users');
        const records = localStorage.getItem('meal_records');
        const backup = { users: JSON.parse(users), records: JSON.parse(records) };
        const dataStr = JSON.stringify(backup, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `meal_backup_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importBackup(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (data.users && Array.isArray(data.users) && data.records && Array.isArray(data.records)) {
                    localStorage.setItem('meal_users', JSON.stringify(data.users));
                    localStorage.setItem('meal_records', JSON.stringify(data.records));
                    alert('导入成功！请重新登录。');
                    location.reload();
                } else {
                    alert('备份文件格式错误');
                }
            } catch(err) {
                alert('解析失败：' + err.message);
            }
        };
        reader.readAsText(file);
    }

    // 选项卡切换
    function initTabs() {
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.getAttribute('data-tab');
                document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
                tabs.forEach(b => b.classList.remove('active'));
                document.getElementById(`tab-${tabId}`).classList.add('active');
                btn.classList.add('active');
                if (tabId === 'month' && document.getElementById('monthPicker').value) {
                    renderMonth(document.getElementById('monthPicker').value);
                }
            });
        });
    }

    async function initMain() {
        document.getElementById('authView').classList.add('hidden');
        document.getElementById('mainView').classList.remove('hidden');
        document.getElementById('welcomeUser').innerText = `👋 欢迎, ${currentUser}`;
        let now = new Date();
        let defaultMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
        document.getElementById('monthPicker').value = defaultMonth;
        await renderToday();
        await renderMonth(defaultMonth);
        initTabs();
        // 绑定按钮
        document.getElementById('refreshTodayBtn').onclick = () => renderToday();
        document.getElementById('printTodayBtn').onclick = handlePrintToday;
        document.getElementById('exportTodayBtn').onclick = handleExportToday;
        document.getElementById('printMonthBtn').onclick = handlePrintMonth;
        document.getElementById('exportMonthBtn').onclick = handleExportMonth;
        document.getElementById('refreshMonthBtn').onclick = () => { let m = document.getElementById('monthPicker').value; if(/^\d{4}-\d{2}$/.test(m)) renderMonth(m); else alert('月份格式YYYY-MM'); };
        document.getElementById('editTodayBtn').onclick = openEditModal;
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; document.getElementById('authView').classList.remove('hidden'); document.getElementById('mainView').classList.add('hidden'); document.getElementById('loginForm').classList.remove('hidden'); document.getElementById('registerForm').classList.add('hidden'); };
    }

    window.onload = () => {
        // 登录事件
        document.getElementById('btnLogin').onclick = async () => {
            let user = document.getElementById('loginUsername').value.trim();
            let pwd = document.getElementById('loginPassword').value;
            let errDiv = document.getElementById('loginError');
            if (!user || !pwd) { errDiv.innerText = '用户名/密码不能为空'; errDiv.classList.remove('hidden'); setTimeout(()=>errDiv.classList.add('hidden'),3000); return; }
            let res = await loginUser(user, pwd);
            if (res.ok) {
                currentUser = user;
                if (document.getElementById('rememberCheckbox').checked) { localStorage.setItem('savedUser', user); localStorage.setItem('savedPwd', pwd); }
                else { localStorage.removeItem('savedUser'); localStorage.removeItem('savedPwd'); }
                await initMain();
            } else { errDiv.innerText = res.msg; errDiv.classList.remove('hidden'); setTimeout(()=>errDiv.classList.add('hidden'),3000); }
        };
        document.getElementById('btnShowRegister').onclick = () => { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerForm').classList.remove('hidden'); };
        document.getElementById('btnBackLogin').onclick = () => { document.getElementById('registerForm').classList.add('hidden'); document.getElementById('loginForm').classList.remove('hidden'); };
        document.getElementById('btnRegister').onclick = async () => {
            let user = document.getElementById('regUsername').value.trim();
            let pwd = document.getElementById('regPassword').value;
            let pwd2 = document.getElementById('regConfirmPwd').value;
            let errDiv = document.getElementById('regError');
            if (!user || !pwd) { errDiv.innerText = '用户名/密码不能为空'; errDiv.classList.remove('hidden'); setTimeout(()=>errDiv.classList.add('hidden'),3000); return; }
            if (pwd !== pwd2) { errDiv.innerText = '两次密码不一致'; errDiv.classList.remove('hidden'); setTimeout(()=>errDiv.classList.add('hidden'),3000); return; }
            let res = await registerUser(user, pwd);
            if (res.ok) {
                alert('注册成功，请登录');
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('loginUsername').value = user;
                document.getElementById('loginPassword').value = '';
            } else { errDiv.innerText = res.msg; errDiv.classList.remove('hidden'); setTimeout(()=>errDiv.classList.add('hidden'),3000); }
        };
        // 记住密码填充
        let savedUser = localStorage.getItem('savedUser');
        let savedPwd = localStorage.getItem('savedPwd');
        if (savedUser && savedPwd) {
            document.getElementById('loginUsername').value = savedUser;
            document.getElementById('loginPassword').value = savedPwd;
            document.getElementById('rememberCheckbox').checked = true;
        }
        // 数据导入导出
        document.getElementById('exportDataBtn').onclick = exportBackup;
        const importBtn = document.getElementById('importDataBtn');
        const fileInput = document.getElementById('importFileInput');
        importBtn.onclick = () => fileInput.click();
        fileInput.onchange = (e) => { if (e.target.files.length) importBackup(e.target.files[0]); e.target.value = ''; };
    };
</script>
